services:
  db:
    image: mysql:8.0
    container_name: kibo_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-kiboAuto_2025}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-kiboAuto_2025}
      MYSQL_PASSWORD: ${DB_PASSWORD:-kiboAuto_2025}
      MYSQL_USER: ${DB_USERNAME:-Kiboauto_2025_admin}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - kibo_network
    healthcheck:
      test: ["CMD", "sh", "-c", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 30s
    ports:
      - "3307:3306"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kibo_app
    restart: unless-stopped
    working_dir: /var/www/html
    env_file: .env
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - kibo_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-kiboAuto_2025}
      - DB_USERNAME=${DB_USERNAME:-Kiboauto_2025_admin}
      - DB_PASSWORD=${DB_PASSWORD:-kiboAuto_2025}
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  nginx:
    image: nginx:alpine
    container_name: kibo_nginx
    restart: unless-stopped
    ports:
      - "8084:8084"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - kibo_network
    depends_on:
      - app

  redis:
    image: redis:alpine
    container_name: kibo_redis
    restart: unless-stopped
    networks:
      - kibo_network

  node:
    image: node:20-alpine
    container_name: kibo_node
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - /var/www/html/node_modules
    networks:
      - kibo_network
    command: sh -c "npm install && tail -f /dev/null"
    depends_on:
      - app

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kibo_queue
    restart: unless-stopped
    working_dir: /var/www/html
    env_file: .env
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - kibo_network
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600 --timeout=300
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_started
      db:
        condition: service_healthy
    environment:
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-database}
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-kiboAuto_2025}
      - DB_USERNAME=${DB_USERNAME:-Kiboauto_2025_admin}
      - DB_PASSWORD=${DB_PASSWORD:-kiboAuto_2025}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MAIL_MAILER=${MAIL_MAILER:-kibomailer_relay}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-tls}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME}

networks:
  kibo_network:
    driver: bridge

volumes:
  db_data:
